home:
  - items:
      - q: "What is Taxy?"
        a: |
          <p>Taxy helps accounting firms structure, send and track client information requests for tax jobs.</p>
          <p>Clients receive clear requests in one place, and your team can immediately see what has been provided and what is still outstanding.</p>

      - q: "How is Taxy different from using email or a client portal?"
        a: |
          <p>Email threads and portals often become a dumping ground for documents and questions, making it hard to see what&rsquo;s still missing.</p>
          <p>Taxy structures requests so clients know exactly what&rsquo;s required and teams can quickly track progress without digging through emails.</p>

      - q: "How long does it take to get started?"
        a: |
          <p>Customers typically send their first request within a few days. Many begin with a single job or multi-entity client group to see how Taxy fits alongside their existing workflow.</p>

      - q: "Will my clients actually use it?"
        a: |
          <p>Most firms are surprised by how quickly clients respond when requests are clear and organised.</p>
          <p>Clients can see exactly what&rsquo;s needed, upload documents or responses in one place, and work through requests at their own pace.</p>

      - q: "Is my data secure in Taxy?"
        a: |
          <p>Yes. Security is core to Taxy.</p>
          <p>All information is encrypted, stored in Australia, and only accessible to authorised users in your workspace.</p>

clients:
  - items:
      - q: "Why has my accountant invited me to Taxy?"
        a: |
          <p>Your accountant is using Taxy to collect the information and documents they need from you.</p>
          <p>Instead of sending long email lists or multiple follow-ups, Taxy organises everything in one place, so you can see what's needed and respond when it suits you.</p>

      - q: "What's the benefit for me?"
        a: |
          <p>Everything your accountant needs from you is set out clearly in one place, so it's far less hassle than digging through long emails or a clunky portal.</p>
          <p>Requests are broken into small, manageable queries you can complete in your own time. Your accountant can also see live progress, which means less chasing and fewer follow-up emails.</p>

      - q: "What do I need to do when I receive a request?"
        a: |
          <p>When you receive the invitation email, simply follow the link to access your request.</p>
          <p>Once logged in, you'll see a list of queries your accountant needs answered. For each one you can upload a document or answer the question directly in Taxy.</p>

      - q: "How long will it take to send all my information?"
        a: |
          <p>Requests are broken into small, manageable queries so you can work through them gradually.</p>
          <p>Some responses may only take a few seconds, while others might involve uploading documents you don't have to hand. Many people find it easier to complete requests over a few short sessions rather than trying to gather everything at once.</p>

      - q: "What if I can't answer something?"
        a: |
          <p>If you've been asked for a document you don't have to hand, you can skip it for now and come back later.</p>
          <p>If you're unsure about anything, add a comment and your accountant will reply in the same place. That keeps it all in one thread, so nothing slips through.</p>

      - q: "Is my information secure?"
        a: |
          <p>Yes. Your information is safer in Taxy than it would be over email, which is where this kind of detail usually travels.</p>
          <p>All data is encrypted, stored in Australia, and only accessible to authorised users within your accountant's workspace.</p>

      - q: "Who should I contact if I have a question?"
        a: |
          <p>If you have questions about the information being requested, the best person to contact is your accountant.</p>
          <p>If you're having trouble accessing your account or have questions about Taxy, please contact us:</p>
          <ul>
            <li>support@taxy.au</li>
            <li>+61 2 7247 2472</li>
          </ul>

firms:
  - section: "Understanding Taxy"
    items:
      - q: "What does Taxy actually do?"
        a: |
          <p>Taxy is the tax workflow platform built for Australian accounting firms. It gives your team one place to build, send and track the information requests behind every tax job, across the whole year rather than just at lodgement.</p>
          <p>As responses come in, you can see at a glance what is back and what is still outstanding, without piecing together where each job is up to.</p>

      - q: "How is Taxy different from using email or a client portal?"
        a: |
          <p><strong>Clearer requests:</strong> generic email checklists get slow, incomplete responses. Taxy makes each request specific to the client, so they know exactly what to provide.</p>
          <p><strong>A better client experience:</strong> portals are built for storing files, not guiding a client through what you actually need. Taxy walks them through it, step by step.</p>
          <p><strong>Greater visibility:</strong> you can see at a glance what's come back and whether a job is ready to be picked up.</p>

      - q: "Where does Taxy fit in a tax job?"
        a: |
          <p>Taxy supports the early stages of any tax job, from building a client request to the point the information is ready and the work can be prepared.</p>
          <p>Because so much tax work is really about collecting and clarifying information, improving this stage helps teams move through their jobs more efficiently.</p>

      - q: "Is Taxy built for complex client groups?"
        a: |
          <p>Yes. It is purpose-built for the way Australian firms work. A client group can hold many entities (individuals, trusts, partnerships and companies), each with its own request for each financial year, all under one client login.</p>
          <p>Generic portals are not designed for this. Taxy is.</p>

      - q: "Is our information secure in Taxy?"
        a: |
          <p>Yes. Security is core to Taxy.</p>
          <p>All data is encrypted, stored in Australia, and only accessible to authorised users in your workspace.</p>
          <p>If you'd like more information on our security and data handling practices, please contact us.</p>

  - section: "Getting started"
    items:
      - q: "How long does it take to get started with Taxy?"
        a: |
          <p>Your first request can usually be sent within a few days. The hardest part is often choosing the first client to test with.</p>
          <p>Most firms run Taxy alongside their existing process at first, so they can see the time savings for themselves without disrupting anything.</p>

      - q: "Does getting started involve a big implementation?"
        a: |
          <p>No. Most firms start with a single multi-entity client group and run a proof of concept, rather than rolling Taxy across the whole practice before they know it saves time.</p>
          <p>Once teams see how much time is saved managing requests and follow-ups, they naturally add more of their clients to the platform over time.</p>

      - q: "What do we need to do before sending our first request?"
        a: |
          <p>Very little. You simply choose a client you want to test Taxy with and provide us with any existing request templates you have. We load these into the platform for you.</p>
          <p>In most cases, new customers choose a client and spend around 30 minutes with our onboarding team before inviting their first client to Taxy.</p>

      - q: "What does the onboarding process look like?"
        a: |
          <p>Once you've run a proof of concept and decide to roll Taxy out to more clients, our team runs a kick off call and ensures any manual effort sits with us, not you.</p>
          <p>You'll provide us with some basic client information (securely) and the system does the heavy lifting to put a draft request together for you to review before sending out in your own time.</p>

      - q: "How much does Taxy cost?"
        a: |
          <p>$9 per entity per year, plus GST. Unlimited users, no setup fees, no per-seat charges.</p>
          <p><a href="/pricing/">See full pricing</a>.</p>

  - section: "Client experience"
    items:
      - q: "What do clients see?"
        a: |
          <p>First, clients get a secure invitation to log in.</p>
          <p>From there, they're guided through your request, broken into small, manageable queries, each with a response field or document upload.</p>

      - q: "Do clients struggle to use Taxy?"
        a: |
          <p>It is a fair thing to worry about. Even our most sceptical customers have found their clients prefer it.</p>
          <p>Compared to email chains and upload portals, Taxy is simpler and clearer, so there is less confusion, not more.</p>

      - q: "How do clients know what's still outstanding?"
        a: |
          <p>Status indicators clearly show which queries still need a response and which they've sent back. Once a query has been returned, it disappears from the client's worklist, but they can always go back to past requests and answers.</p>

  - section: "Workflow & visibility"
    items:
      - q: "How does Taxy help track outstanding requests?"
        a: |
          <p>The dashboard provides a clear view of how many queries have been returned and which are still outstanding for each client.</p>
          <p>As clients respond, progress updates automatically. This makes it easy to see where each job is up to and follow up on missing information without piecing together emails or notes.</p>

      - q: "Can we customise requests for different entities or jobs?"
        a: |
          <p>Yes. Tailoring requests is one of the ways Taxy reduces the back-and-forth that comes with generic email requests.</p>
          <p>Templates are built around common queries, but each request can include a different combination of questions and documents depending on the client or entity. Templates can also be updated at any time as your processes evolve.</p>

      - q: "What happens after a client responds with everything?"
        a: |
          <p>Once the full request has been returned, you can move straight into preparing the job in your lodgement software.</p>
          <p>Taxy gives you confidence that the information behind the job is organised in one place and easy to access during final review.</p>
