client_voices:
  - quote: "I wasn't sure what to expect with a new system, but Taxy is very easy to use. Being able to see what I'd provided in previous years was especially helpful when I applied for a loan."
    name: "Adrian"
    role: "Client, VIC"
    image: "/assets/wp-content/uploads/2025/12/7-e1766042917890.png"

  - quote: "I like using Taxy because it's more collaborative than email, and it's much easier to send back exactly what my accountant needs."
    name: "Karin"
    role: "Client, NSW"
    image: "/assets/wp-content/uploads/2025/12/3-e1766043073900.png"

  - quote: "I have several entities, and I like sending documents throughout the year. Taxy is a lot clearer than emailing, and now I know whether I'm the one holding things up."
    name: "Alison"
    role: "Client, NSW"
    image: "/assets/wp-content/uploads/2025/12/1-e1766043021172.png"

  - quote: "I love using Taxy. It's easy to use, and takes a lot of the stress out of sharing documents. If I ever had to change accountants, I'd absolutely ask the new firm to use it as well."
    name: "Chris"
    role: "Client, NSW"
    image: "/assets/wp-content/uploads/2025/12/4-e1766043098442.png"
