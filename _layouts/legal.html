---
layout: marketing
---
{% include hero.html title=page.heading %}

<section class="section section--tight">
  <div class="container">
    {% if page.toc %}
    <nav class="legal-toc" aria-label="On this page" hidden>
      <p class="legal-toc__title">On this page</p>
      <ol class="legal-toc__list"></ol>
    </nav>
    {% endif %}

    <div class="prose prose--legal">
      {{ content }}
    </div>
  </div>
</section>

<button class="back-to-top" type="button" aria-label="Back to top">↑ Top</button>

<script>
  (function () {
    var prose = document.querySelector('.prose--legal');

    // Build the "On this page" list from the rendered headings (kramdown adds the ids).
    var toc = document.querySelector('.legal-toc');
    if (toc && prose) {
      var list = toc.querySelector('.legal-toc__list');
      prose.querySelectorAll('h2[id], h3[id]').forEach(function (h) {
        var li = document.createElement('li');
        if (h.tagName === 'H3') li.className = 'is-sub';
        var a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent;
        li.appendChild(a);
        list.appendChild(li);
      });
      if (list.children.length) toc.removeAttribute('hidden');
    }

    // Label each table cell with its column header so the CSS can reflow wide
    // tables into stacked cards on mobile (see .prose--legal table styles).
    // Tables with no header row (e.g. the DPA annex key→value table) are left
    // unlabelled and simply stack.
    if (prose) {
      prose.querySelectorAll('table').forEach(function (table) {
        var headers = Array.prototype.map.call(
          table.querySelectorAll('thead th'),
          function (th) { return th.textContent.trim(); }
        );
        if (!headers.length) return;
        table.querySelectorAll('tbody tr').forEach(function (row) {
          Array.prototype.forEach.call(row.children, function (cell, i) {
            if (headers[i]) cell.setAttribute('data-label', headers[i]);
          });
        });
      });
    }

    // Reveal the back-to-top button once the reader has scrolled past a screen.
    var btn = document.querySelector('.back-to-top');
    if (btn) {
      var onScroll = function () {
        btn.classList.toggle('is-visible', window.scrollY > window.innerHeight);
      };
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
      btn.addEventListener('click', function () {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    }
  })();
</script>
