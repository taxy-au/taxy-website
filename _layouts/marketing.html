<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;0,900;1,400&display=swap">

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <link rel="icon" href="{{ '/assets/wp-content/uploads/2024/09/favicon-150x150.png' | relative_url }}" sizes="32x32">
  <link rel="icon" href="{{ '/assets/wp-content/uploads/2024/09/favicon-300x300.png' | relative_url }}" sizes="192x192">
  <link rel="apple-touch-icon" href="{{ '/assets/wp-content/uploads/2024/09/favicon-300x300.png' | relative_url }}">

  {% seo %}

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZBYCTEPZY1"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-ZBYCTEPZY1');
  </script>
</head>
<body>
  <a class="skip-link" href="#content">Skip to content</a>
  <span id="top" aria-hidden="true"></span>

  {% include marketing-header.html %}

  <main id="content">
    {{ content }}
  </main>

  {% include marketing-footer.html %}

  <script>
    // Lite-Loom: click-to-load wrapper around the Loom iframe. Replaces the
    // poster with the real iframe so the player JS (~1MB) only loads on demand.
    document.addEventListener('click', function (e) {
      var btn = e.target.closest('.lite-loom');
      if (!btn) return;
      var id = btn.dataset.loomId;
      var sid = btn.dataset.loomSid;
      if (!id) return;
      var src = 'https://www.loom.com/embed/' + id +
                (sid ? '?sid=' + sid + '&autoplay=1' : '?autoplay=1');
      var iframe = document.createElement('iframe');
      iframe.src = src;
      iframe.title = btn.getAttribute('aria-label') || 'Video';
      iframe.allow = 'autoplay; fullscreen';
      iframe.allowFullscreen = true;
      iframe.setAttribute('frameborder', '0');
      // Replace the button with the iframe in-place; .video-embed styles
      // give it the 16:9 frame and shadow.
      var wrap = document.createElement('div');
      wrap.className = btn.className.replace('lite-loom', '').trim();
      wrap.appendChild(iframe);
      btn.replaceWith(wrap);
    });
  </script>

</body>
</html>
